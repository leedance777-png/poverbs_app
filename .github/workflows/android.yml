name: Build APK

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 코드 가져오기
        uses: actions/checkout@v4

      - name: Java 설치
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: gradlew 권한
        run: chmod +x ./gradlew

      - name: APK 생성
        run: ./gradlew assembleDebug

      - name: APK 업로드
        uses: actions/upload-artifact@v4
        with:
          name: proverbs-apk
          path: app/build/outputs/apk/debug/*.apk
